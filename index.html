<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>5.Cortex — Файлообменник + Сокращатель ссылок</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at 10% 20%, #0a0a14 0%, #020206 100%);
            min-height: 100vh;
            color: #eef2ff;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .glass-card {
            background: rgba(12, 16, 28, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            border: 1px solid rgba(79, 122, 255, 0.3);
            padding: 28px 24px;
            margin-bottom: 24px;
            transition: transform 0.2s;
        }
        h1 {
            font-size: 2.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #7c9eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .sub { color: #9aa9c1; margin-bottom: 28px; border-left: 3px solid #4f7aff; padding-left: 14px; }
        .tabs { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
        .tab-btn {
            background: rgba(30, 35, 55, 0.6);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 60px;
            padding: 12px 28px;
            font-weight: 600;
            color: #b9c3e6;
            cursor: pointer;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #4f7aff, #2b4cd4);
            color: white;
            box-shadow: 0 6px 16px rgba(79,122,255,0.3);
        }
        .tab-pane { display: none; animation: fadeIn 0.3s; }
        .tab-pane.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .dropzone {
            border: 2px dashed rgba(79,122,255,0.6);
            border-radius: 40px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            background: rgba(0,0,0,0.3);
        }
        .btn {
            background: linear-gradient(135deg, #4f7aff, #2b4cd4);
            border: none;
            border-radius: 60px;
            padding: 12px 32px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-outline { background: transparent; border: 1px solid #4f7aff; }
        .file-preview, .url-input-group, .history-item { background: rgba(0,0,0,0.3); border-radius: 32px; padding: 16px; margin-top: 16px; }
        .url-input-group { display: flex; gap: 12px; flex-wrap: wrap; }
        .url-input-group input { flex: 1; background: rgba(30,35,55,0.8); border: 1px solid #2a2f3f; border-radius: 60px; padding: 14px 20px; color: white; }
        .history-item { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #1e293b; backdrop-filter: blur(20px); padding: 12px 28px;
            border-radius: 60px; z-index: 1000; animation: fadeUp 0.3s;
            border: 1px solid #4f7aff;
        }
        @keyframes fadeUp { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        @media (max-width: 640px) { .glass-card { padding: 20px; } h1 { font-size: 1.8rem; } }
    </style>
</head>
<body>
<div class="container">
    <div class="glass-card" style="text-align: center;">
        <h1>⚡ 5.Cortex Tools</h1>
        <div class="sub">Файлообменник + Сокращатель ссылок — полностью автономно</div>
    </div>
    <div class="tabs">
        <button class="tab-btn active" data-tab="files">📁 Файлообменник</button>
        <button class="tab-btn" data-tab="links">🔗 Сокращатель ссылок</button>
    </div>

    <!-- Файлообменник -->
    <div id="files-tab" class="tab-pane active">
        <div class="glass-card">
            <div id="dropzone" class="dropzone">
                📂 Перетащите файл или нажмите для выбора (до 2 МБ)
                <input type="file" id="fileInput" style="display: none;">
                <div style="margin-top: 20px;"><button id="selectBtn" class="btn">Выбрать файл</button></div>
            </div>
            <div id="fileInfo" class="file-preview" style="display: none;"></div>
            <div id="shortenAfter" style="display: none; margin-top: 16px; text-align: center;">
                <button id="shortenFileLinkBtn" class="btn">🔗 Сократить эту ссылку</button>
            </div>
        </div>
        <div class="glass-card">
            <div style="display: flex; justify-content: space-between;">
                <h2 style="font-size: 1.4rem;">📋 История файловых ссылок</h2>
                <button id="clearHistoryBtn" class="btn-outline btn" style="padding: 6px 16px;">Очистить</button>
            </div>
            <div id="historyList"></div>
        </div>
    </div>

    <!-- Сокращатель ссылок -->
    <div id="links-tab" class="tab-pane">
        <div class="glass-card">
            <h2 style="font-size: 1.4rem;">Создать короткую ссылку</h2>
            <div class="url-input-group">
                <input type="text" id="longUrlInput" placeholder="Введите любую длинную ссылку">
                <div style="display: flex; align-items: center; gap: 8px; background: #1a1f2e; border-radius: 60px; padding: 0 16px;">
                    <span style="color:#8e9bb5;">?go=</span>
                    <input type="text" id="customCode" placeholder="код" style="background:transparent; border:none; color:white; width:100px;">
                </div>
                <button id="shortenBtn" class="btn">Сократить</button>
            </div>
            <p style="font-size:0.75rem; margin-top:8px;">Короткая ссылка: <span id="exampleShortUrl"></span></p>
        </div>
        <div class="glass-card">
            <div style="display: flex; justify-content: space-between;">
                <h2 style="font-size: 1.4rem;">📋 Мои короткие ссылки</h2>
                <button id="clearLinksBtn" class="btn-outline btn" style="padding: 6px 16px;">Очистить все</button>
            </div>
            <div id="linksList"></div>
        </div>
    </div>
</div>

<script>
    // ==================== ФАЙЛООБМЕННИК (Data URL) ====================
    const FILE_STORAGE = 'cortex_file_history';
    let fileHistory = [];

    function loadFileHistory() {
        const saved = localStorage.getItem(FILE_STORAGE);
        if (saved) { try { fileHistory = JSON.parse(saved); } catch(e) { fileHistory = []; } }
        renderFileHistory();
    }
    function saveFileHistory() { localStorage.setItem(FILE_STORAGE, JSON.stringify(fileHistory.slice(0, 30))); }
    function addToFileHistory(fileName, fileSize, fileUrl) {
        fileHistory.unshift({ id: Date.now(), name: fileName, size: fileSize, url: fileUrl, date: new Date().toISOString() });
        saveFileHistory();
        renderFileHistory();
    }
    function formatBytes(bytes) {
        if (bytes === 0) return '0 B';
        const k = 1024;
        const sizes = ['B', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
    }
    function renderFileHistory() {
        const container = document.getElementById('historyList');
        if (!container) return;
        if (fileHistory.length === 0) { container.innerHTML = '<div style="text-align:center; padding:20px;">Нет созданных файловых ссылок</div>'; return; }
        container.innerHTML = fileHistory.map(item => `
            <div class="history-item" data-id="${item.id}">
                <div style="flex:1;">
                    <div><strong>${escapeHtml(item.name)}</strong> (${formatBytes(item.size)})</div>
                    <div style="font-size:0.7rem; color:#7c9eff; word-break:break-all;">${escapeHtml(item.url.substring(0,70))}...</div>
                    <div style="font-size:0.65rem;">${new Date(item.date).toLocaleString()}</div>
                </div>
                <div style="display:flex; gap:8px;">
                    <button class="copy-file-link" data-url="${item.url}" style="background:rgba(79,122,255,0.3); border:none; border-radius:40px; padding:6px 12px;">📋 Копировать</button>
                    <button class="shorten-existing" data-url="${item.url}" style="background:rgba(255,200,0,0.3); border:none; border-radius:40px; padding:6px 12px;">🔗 Сократить</button>
                    <button class="delete-file" data-id="${item.id}" style="background:rgba(255,60,60,0.3); border:none; border-radius:40px; padding:6px 12px;">🗑</button>
                </div>
            </div>
        `).join('');
        document.querySelectorAll('.copy-file-link').forEach(btn => btn.addEventListener('click', (e) => { copyToClipboard(btn.getAttribute('data-url')); showToast('Ссылка скопирована'); }));
        document.querySelectorAll('.shorten-existing').forEach(btn => btn.addEventListener('click', (e) => {
            const url = btn.getAttribute('data-url');
            document.querySelector('.tab-btn[data-tab="links"]').click();
            document.getElementById('longUrlInput').value = url;
            document.getElementById('shortenBtn').click();
        }));
        document.querySelectorAll('.delete-file').forEach(btn => btn.addEventListener('click', (e) => {
            const id = parseInt(btn.getAttribute('data-id'));
            fileHistory = fileHistory.filter(i => i.id !== id);
            saveFileHistory(); renderFileHistory(); showToast('Удалено');
        }));
    }

    function createFileLink(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => {
                const dataUrl = reader.result;
                const link = window.location.href.split('#')[0] + '#file=' + encodeURIComponent(dataUrl) + '&name=' + encodeURIComponent(file.name);
                resolve(link);
            };
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }

    // Обработка перехода по файловой ссылке
    function handleFileFromHash() {
        const hash = window.location.hash.substring(1);
        if (hash.startsWith('file=')) {
            const params = new URLSearchParams(hash);
            const dataUrl = decodeURIComponent(params.get('file'));
            const fileName = params.get('name') || 'download';
            showDownloadPage(dataUrl, fileName);
        }
    }
    function showDownloadPage(dataUrl, fileName) {
        document.body.innerHTML = '';
        const container = document.createElement('div');
        container.className = 'container';
        container.style.display = 'flex';
        container.style.justifyContent = 'center';
        container.style.alignItems = 'center';
        container.style.minHeight = '100vh';
        document.body.appendChild(container);
        const sizeBytes = Math.round((dataUrl.length * 3) / 4);
        container.innerHTML = `
            <div class="glass-card" style="text-align:center; max-width:500px;">
                <h1>📎 5.Cortex Share</h1>
                <div style="margin:30px 0;">
                    <div style="font-size:3rem;">📄</div>
                    <div style="font-weight:600; font-size:1.2rem;">${escapeHtml(fileName)}</div>
                    <div style="color:#8e9bb5;">${formatBytes(sizeBytes)}</div>
                </div>
                <button id="downloadBtn" class="btn">⬇️ Скачать</button>
                <button id="backBtn" class="btn-outline btn" style="margin-top:16px;">← На главную</button>
            </div>
        `;
        document.getElementById('downloadBtn').onclick = () => { const a = document.createElement('a'); a.href = dataUrl; a.download = fileName; a.click(); };
        document.getElementById('backBtn').onclick = () => window.location.href = window.location.href.split('#')[0];
    }

    // ==================== СОКРАЩАТЕЛЬ ССЫЛОК ====================
    const LINKS_STORAGE = 'cortex_short_links';
    let shortLinks = [];
    function getBaseUrl() { return window.location.href.split('?')[0].split('#')[0]; }
    function loadLinks() {
        const saved = localStorage.getItem(LINKS_STORAGE);
        if (saved) { try { shortLinks = JSON.parse(saved); } catch(e) { shortLinks = []; } }
        renderLinks();
        document.getElementById('exampleShortUrl').innerText = getBaseUrl() + '?go=код';
    }
    function saveLinks() { localStorage.setItem(LINKS_STORAGE, JSON.stringify(shortLinks.slice(0, 100))); }
    function generateShortCode() { return Math.random().toString(36).substr(2, 6); }
    function isCodeAvailable(code) { return !shortLinks.some(l => l.code === code); }
    function addShortLink(originalUrl, customCode = null) {
        let code = customCode ? customCode.trim() : '';
        if (code) {
            if (!isCodeAvailable(code)) { showToast('Код занят'); return null; }
            if (!/^[a-zA-Z0-9\-_]+$/.test(code)) { showToast('Недопустимые символы'); return null; }
        } else { do { code = generateShortCode(); } while (!isCodeAvailable(code)); }
        const shortUrl = `${getBaseUrl()}?go=${code}`;
        shortLinks.unshift({ id: Date.now(), original: originalUrl, code, short: shortUrl, clicks: 0, date: new Date().toISOString() });
        saveLinks(); renderLinks();
        return shortUrl;
    }
    function renderLinks() {
        const container = document.getElementById('linksList');
        if (!container) return;
        if (shortLinks.length === 0) { container.innerHTML = '<div style="text-align:center; padding:20px;">Нет коротких ссылок</div>'; return; }
        container.innerHTML = shortLinks.map(item => `
            <div class="history-item" data-id="${item.id}">
                <div style="flex:1;">
                    <div><strong>${escapeHtml(item.short)}</strong></div>
                    <div style="font-size:0.7rem; color:#aaa;">→ ${escapeHtml(item.original.substring(0,60))}...</div>
                    <div style="font-size:0.65rem;">Кликов: ${item.clicks} • ${new Date(item.date).toLocaleString()}</div>
                </div>
                <div style="display:flex; gap:8px;">
                    <button class="copy-short" data-url="${item.short}">📋 Копировать</button>
                    <button class="delete-short" data-id="${item.id}" style="background:rgba(255,60,60,0.3);">🗑</button>
                </div>
            </div>
        `).join('');
        document.querySelectorAll('.copy-short').forEach(btn => btn.addEventListener('click', () => { copyToClipboard(btn.getAttribute('data-url')); showToast('Скопировано'); }));
        document.querySelectorAll('.delete-short').forEach(btn => btn.addEventListener('click', (e) => {
            const id = parseInt(btn.getAttribute('data-id'));
            shortLinks = shortLinks.filter(l => l.id !== id);
            saveLinks(); renderLinks(); showToast('Удалено');
        }));
    }
    function handleRedirectFromParam() {
        const code = new URLSearchParams(window.location.search).get('go');
        if (code) {
            const saved = localStorage.getItem(LINKS_STORAGE);
            if (saved) {
                try {
                    const links = JSON.parse(saved);
                    const found = links.find(l => l.code === code);
                    if (found) {
                        found.clicks = (found.clicks || 0) + 1;
                        localStorage.setItem(LINKS_STORAGE, JSON.stringify(links));
                        window.location.href = found.original;
                        return;
                    }
                } catch(e) {}
            }
            document.body.innerHTML = `<div style="display:flex; justify-content:center; align-items:center; height:100vh; background:#0a0a14; color:white;"><div><h1>🔗 Ссылка не найдена</h1><a href="${getBaseUrl()}">На главную</a></div></div>`;
        }
    }

    // ==================== ОБЩИЕ УТИЛИТЫ ====================
    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).catch(() => {
            const ta = document.createElement('textarea');
            ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
        });
    }
    function showToast(msg) {
        let toast = document.querySelector('.toast');
        if (toast) toast.remove();
        toast = document.createElement('div'); toast.className = 'toast'; toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }
    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

    // ==================== ИНИЦИАЛИЗАЦИЯ UI ====================
    // Вкладки
    const tabs = document.querySelectorAll('.tab-btn');
    const panes = { files: document.getElementById('files-tab'), links: document.getElementById('links-tab') };
    tabs.forEach(btn => btn.addEventListener('click', () => {
        const tab = btn.getAttribute('data-tab');
        tabs.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        Object.values(panes).forEach(p => p.classList.remove('active'));
        panes[tab].classList.add('active');
    }));

    // Файлообменник
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const selectBtn = document.getElementById('selectBtn');
    const fileInfoDiv = document.getElementById('fileInfo');
    const shortenAfterDiv = document.getElementById('shortenAfter');
    let currentFileLink = '';

    async function processFile(file) {
        if (file.size > 2 * 1024 * 1024) { showToast('Файл >2 МБ, ссылка может не работать'); return; }
        fileInfoDiv.style.display = 'block';
        fileInfoDiv.innerHTML = `<div style="display:flex; justify-content:space-between; align-items:center;">
            <span>📄 ${escapeHtml(file.name)} (${formatBytes(file.size)})</span>
            <button id="generateLinkBtn" class="btn" style="padding:6px 16px;">🔗 Создать ссылку</button>
        </div>`;
        document.getElementById('generateLinkBtn').onclick = async () => {
            currentFileLink = await createFileLink(file);
            addToFileHistory(file.name, file.size, currentFileLink);
            copyToClipboard(currentFileLink);
            showToast('Файловая ссылка создана и скопирована!');
            fileInfoDiv.style.display = 'none';
            shortenAfterDiv.style.display = 'block';
        };
    }
    dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('drag-over'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
    dropzone.addEventListener('drop', (e) => { e.preventDefault(); dropzone.classList.remove('drag-over'); if (e.dataTransfer.files.length) processFile(e.dataTransfer.files[0]); });
    dropzone.addEventListener('click', () => fileInput.click());
    selectBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => { if (fileInput.files.length) processFile(fileInput.files[0]); fileInput.value = ''; });
    document.getElementById('shortenFileLinkBtn').onclick = () => {
        if (currentFileLink) {
            document.querySelector('.tab-btn[data-tab="links"]').click();
            document.getElementById('longUrlInput').value = currentFileLink;
            document.getElementById('shortenBtn').click();
            shortenAfterDiv.style.display = 'none';
        }
    };
    document.getElementById('clearHistoryBtn').addEventListener('click', () => { if (confirm('Очистить историю файлов?')) { fileHistory = []; saveFileHistory(); renderFileHistory(); showToast('История очищена'); } });

    // Сокращатель
    document.getElementById('shortenBtn').addEventListener('click', () => {
        let longUrl = document.getElementById('longUrlInput').value.trim();
        if (!longUrl) { showToast('Введите ссылку'); return; }
        if (!longUrl.match(/^https?:\/\//i)) longUrl = 'https://' + longUrl;
        try { new URL(longUrl); } catch(e) { showToast('Некорректный URL'); return; }
        const customCode = document.getElementById('customCode').value.trim();
        const shortUrl = addShortLink(longUrl, customCode || null);
        if (shortUrl) {
            copyToClipboard(shortUrl);
            showToast('Короткая ссылка создана и скопирована!');
            document.getElementById('longUrlInput').value = '';
            document.getElementById('customCode').value = '';
        }
    });
    document.getElementById('clearLinksBtn').addEventListener('click', () => { if (confirm('Очистить все короткие ссылки?')) { shortLinks = []; saveLinks(); renderLinks(); showToast('Очищено'); } });

    // Запуск
    loadFileHistory();
    loadLinks();
    handleRedirectFromParam();
    handleFileFromHash();
</script>
</body>
</html>
