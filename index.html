<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>5.CortexShare — быстрый файлообменник</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0a0f1e 0%, #0a0a14 100%);
            min-height: 100vh;
            color: #eef2ff;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Glassmorphism карточки */
        .glass-card {
            background: rgba(20, 25, 40, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 28px 24px;
            margin-bottom: 24px;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #7c9eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
            letter-spacing: -0.3px;
        }

        .sub {
            color: #8e9bb5;
            margin-bottom: 28px;
            border-left: 3px solid #4f7aff;
            padding-left: 14px;
        }

        /* Зона загрузки */
        .dropzone {
            border: 2px dashed rgba(79, 122, 255, 0.5);
            border-radius: 28px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(0, 0, 0, 0.2);
        }

        .dropzone.drag-over {
            border-color: #4f7aff;
            background: rgba(79, 122, 255, 0.1);
            transform: scale(0.99);
        }

        .dropzone-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .btn {
            background: linear-gradient(135deg, #4f7aff, #2b4cd4);
            border: none;
            border-radius: 44px;
            padding: 12px 28px;
            font-weight: 600;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #4f7aff;
            color: #4f7aff;
        }

        .btn-outline:hover {
            background: rgba(79, 122, 255, 0.2);
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #2a2f3f;
            border-radius: 10px;
            overflow: hidden;
            margin: 16px 0;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #4f7aff, #9b4dff);
            transition: width 0.3s;
        }

        .file-item {
            background: rgba(30, 35, 55, 0.6);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .file-info {
            flex: 1;
            min-width: 150px;
        }

        .file-name {
            font-weight: 600;
            word-break: break-all;
        }

        .file-meta {
            font-size: 0.75rem;
            color: #8e9bb5;
            margin-top: 4px;
        }

        .file-link {
            font-size: 0.8rem;
            color: #7c9eff;
            word-break: break-all;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            background: rgba(255, 255, 255, 0.08);
            border: none;
            border-radius: 40px;
            padding: 8px 14px;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
        }

        .icon-btn:hover {
            background: rgba(79, 122, 255, 0.4);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            backdrop-filter: blur(16px);
            padding: 12px 24px;
            border-radius: 60px;
            color: white;
            font-size: 0.9rem;
            z-index: 1000;
            animation: fadeInUp 0.3s ease;
            border: 1px solid rgba(79, 122, 255, 0.4);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        @media (max-width: 640px) {
            .glass-card {
                padding: 20px 16px;
            }
            .file-item {
                flex-direction: column;
                align-items: flex-start;
            }
            .action-buttons {
                align-self: flex-end;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="glass-card">
        <h1>⚡ 5.CortexShare</h1>
        <div class="sub">Быстрый файлообменник — загружайте файлы до 500 МБ, ссылка действует 30 дней</div>

        <div id="dropzone" class="dropzone">
            <div class="dropzone-icon">📂</div>
            <div>Перетащите файл сюда или нажмите для выбора</div>
            <input type="file" id="fileInput" style="display: none;">
            <div style="margin-top: 20px;">
                <button id="selectFileBtn" class="btn">Выбрать файл</button>
            </div>
        </div>

        <div id="uploadProgress" style="display: none;">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div id="uploadStatus" style="font-size: 0.85rem; color: #aaa;">Подготовка...</div>
        </div>
    </div>

    <div class="glass-card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
            <h2 style="font-size: 1.4rem;">📁 Последние загрузки</h2>
            <button id="clearHistoryBtn" class="icon-btn" style="background: rgba(255,60,60,0.2);">Очистить историю</button>
        </div>
        <div id="historyList">
            <div style="text-align: center; color: #8e9bb5; padding: 20px;">Здесь будут ваши загруженные файлы</div>
        </div>
    </div>
</div>

<script>
    // Конфигурация
    const API_UPLOAD = 'https://tmpfiles.org/api/v1/upload';
    const STORAGE_KEY = 'cortexshare_history';

    // Элементы
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const selectBtn = document.getElementById('selectFileBtn');
    const uploadProgressDiv = document.getElementById('uploadProgress');
    const progressFill = document.getElementById('progressFill');
    const uploadStatus = document.getElementById('uploadStatus');
    const historyList = document.getElementById('historyList');
    const clearHistoryBtn = document.getElementById('clearHistoryBtn');

    // История загрузок
    let history = [];

    function loadHistory() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            try {
                history = JSON.parse(saved);
            } catch(e) { history = []; }
        }
        renderHistory();
    }

    function saveHistory() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(history.slice(0, 50))); // храним последние 50
    }

    function addToHistory(fileName, fileSize, downloadUrl, deleteUrl = null) {
        history.unshift({
            id: Date.now(),
            name: fileName,
            size: fileSize,
            url: downloadUrl,
            deleteUrl: deleteUrl,
            date: new Date().toISOString()
        });
        saveHistory();
        renderHistory();
    }

    function formatBytes(bytes) {
        if (bytes === 0) return '0 B';
        const k = 1024;
        const sizes = ['B', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
    }

    function renderHistory() {
        if (!historyList) return;
        if (history.length === 0) {
            historyList.innerHTML = '<div style="text-align: center; color: #8e9bb5; padding: 20px;">Нет загруженных файлов</div>';
            return;
        }
        historyList.innerHTML = history.map(item => `
            <div class="file-item" data-id="${item.id}">
                <div class="file-info">
                    <div class="file-name">${escapeHtml(item.name)}</div>
                    <div class="file-meta">${formatBytes(item.size)} • ${new Date(item.date).toLocaleString()}</div>
                    <div class="file-link" style="font-size: 0.7rem;">${escapeHtml(item.url)}</div>
                </div>
                <div class="action-buttons">
                    <button class="icon-btn copy-link" data-url="${item.url}">📋 Копировать</button>
                    <a href="${item.url}" target="_blank" class="icon-btn" style="text-decoration: none;">🔗 Открыть</a>
                    <button class="icon-btn delete-item" data-id="${item.id}" style="background: rgba(255,60,60,0.2);">🗑</button>
                </div>
            </div>
        `).join('');

        // Обработчики копирования
        document.querySelectorAll('.copy-link').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const url = btn.getAttribute('data-url');
                copyToClipboard(url);
                showToast('Ссылка скопирована!');
            });
        });

        // Удаление отдельных элементов
        document.querySelectorAll('.delete-item').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = parseInt(btn.getAttribute('data-id'));
                history = history.filter(item => item.id !== id);
                saveHistory();
                renderHistory();
                showToast('Файл удалён из истории');
            });
        });
    }

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).catch(() => {
            // fallback
            const textarea = document.createElement('textarea');
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
        });
    }

    function showToast(msg) {
        let toast = document.querySelector('.toast');
        if (toast) toast.remove();
        toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }

    // Загрузка файла на tmpfiles.org
    async function uploadFile(file) {
        const formData = new FormData();
        formData.append('file', file);

        uploadProgressDiv.style.display = 'block';
        progressFill.style.width = '0%';
        uploadStatus.innerText = 'Загрузка...';

        // Симуляция прогресса (реальный прогресс fetch не поддерживает без XHR, но сделаем видимость)
        let progress = 0;
        const progressInterval = setInterval(() => {
            if (progress < 90) {
                progress += 10;
                progressFill.style.width = progress + '%';
            }
        }, 200);

        try {
            const response = await fetch(API_UPLOAD, {
                method: 'POST',
                body: formData
            });

            clearInterval(progressInterval);
            progressFill.style.width = '100%';

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            const data = await response.json();
            // tmpfiles.org возвращает { status: "success", data: { url: "https://tmpfiles.org/dl/...", deleteUrl: "..." } }
            if (data.status !== 'success' || !data.data?.url) {
                throw new Error('Не удалось получить ссылку');
            }

            // Ссылка для скачивания (оригинальная) — она ведёт на страницу с кнопкой.
            // Прямая ссылка на файл: data.data.url.replace('/dl/', '/download/') или добавим /raw? Я проверю.
            let downloadUrl = data.data.url;
            // Конвертируем в прямую ссылку для скачивания (tmpfiles.org позволяет добавить ?download=1)
            if (!downloadUrl.includes('?download')) {
                downloadUrl = downloadUrl + '?download=1';
            }
            const deleteUrl = data.data.delete_url || null;

            addToHistory(file.name, file.size, downloadUrl, deleteUrl);
            uploadStatus.innerText = 'Готово!';
            showToast('Файл загружен! Ссылка скопирована');
            copyToClipboard(downloadUrl);

            setTimeout(() => {
                uploadProgressDiv.style.display = 'none';
                progressFill.style.width = '0%';
            }, 1500);
        } catch (err) {
            clearInterval(progressInterval);
            uploadStatus.innerText = `Ошибка: ${err.message}`;
            console.error(err);
            setTimeout(() => {
                uploadProgressDiv.style.display = 'none';
            }, 3000);
        }
    }

    // Обработчики перетаскивания
    dropzone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropzone.classList.add('drag-over');
    });
    dropzone.addEventListener('dragleave', () => {
        dropzone.classList.remove('drag-over');
    });
    dropzone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropzone.classList.remove('drag-over');
        const files = e.dataTransfer.files;
        if (files.length > 0) {
            uploadFile(files[0]);
        }
    });
    selectBtn.addEventListener('click', () => {
        fileInput.click();
    });
    fileInput.addEventListener('change', () => {
        if (fileInput.files.length > 0) {
            uploadFile(fileInput.files[0]);
            fileInput.value = '';
        }
    });

    clearHistoryBtn.addEventListener('click', () => {
        if (confirm('Очистить всю историю загрузок?')) {
            history = [];
            saveHistory();
            renderHistory();
            showToast('История очищена');
        }
    });

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    loadHistory();
</script>
</body>
</html>
